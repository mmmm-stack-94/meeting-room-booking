<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B棟1樓大會議室預約系統</title>
  <style>
    body {
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f8fafc;
      margin: 0;
      color: #0f172a;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .title {
      font-size: 32px;
      font-weight: bold;
      margin: 0;
    }

    .subtitle {
      color: #64748b;
      margin-top: 6px;
      font-size: 14px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 15px;
    }

    .btn-primary {
      background: #2563eb;
      color: white;
    }

    .btn-danger {
      background: #dc2626;
      color: white;
    }

    .btn-secondary {
      background: white;
      border: 1px solid #cbd5e1;
      color: #334155;
    }

    .toolbar {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .month-title {
      font-size: 24px;
      font-weight: bold;
    }

    .calendar-box {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      overflow: hidden;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .weekday {
      background: #f8fafc;
      padding: 12px;
      text-align: center;
      font-weight: bold;
      color: #94a3b8;
      border-bottom: 1px solid #e2e8f0;
    }

    .day {
      min-height: 120px;
      border-right: 1px solid #f1f5f9;
      border-bottom: 1px solid #f1f5f9;
      padding: 8px;
      box-sizing: border-box;
    }

    .day.empty {
      background: #f8fafc;
    }

    .day-number {
      display: inline-flex;
      width: 28px;
      height: 28px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      font-weight: bold;
      color: #475569;
    }

    .today {
      background: #2563eb;
      color: white;
    }

    .booking {
      margin-top: 8px;
      background: white;
      border: 1px solid #e2e8f0;
      border-left: 4px solid #2563eb;
      border-radius: 8px;
      padding: 8px;
      font-size: 12px;
      cursor: pointer;
    }

    .booking:hover {
      background: #eff6ff;
    }

    .booking-time {
      font-weight: bold;
      color: #1d4ed8;
    }

    .booking-dept {
      color: #64748b;
      margin-top: 2px;
    }

    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 999;
    }

    .modal {
      width: 100%;
      max-width: 560px;
      background: white;
      border-radius: 20px;
      overflow: hidden;
    }

    .modal-header {
      padding: 20px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-size: 28px;
      font-weight: bold;
    }

    .modal-body {
      padding: 20px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      margin-bottom: 12px;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 15px;
    }

    .field textarea {
      resize: vertical;
    }

    .error-box {
      display: none;
      background: #fef2f2;
      color: #dc2626;
      padding: 10px;
      border-radius: 8px;
      margin-top: 12px;
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .loading-mask {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.2);
      align-items: center;
      justify-content: center;
    }

    .loading-box {
      background: white;
      padding: 16px 24px;
      border-radius: 12px;
    }

    @media (max-width: 768px) {
      .title {
        font-size: 26px;
      }

      .month-title {
        font-size: 20px;
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }

      .day {
        min-height: 90px;
        padding: 6px;
      }

      .booking {
        font-size: 11px;
        padding: 6px;
      }

      .weekday {
        font-size: 12px;
        padding: 10px 4px;
      }

      .toolbar {
        align-items: flex-start;
      }

      .actions .btn {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div id="loadingOverlay" class="loading-mask">
    <div class="loading-box">處理中...</div>
  </div>

  <div class="container">
    <div class="topbar">
      <div>
        <h1 class="title">B棟1樓大會議室</h1>
        <div class="subtitle">手機與電腦皆可使用</div>
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">我要預約</button>
    </div>

    <div class="toolbar">
      <div id="monthDisplay" class="month-title"></div>
      <div style="display:flex; gap:8px;">
        <button class="btn btn-secondary" onclick="changeMonth(-1)">上個月</button>
        <button class="btn btn-secondary" onclick="goToToday()">今天</button>
        <button class="btn btn-secondary" onclick="changeMonth(1)">下個月</button>
      </div>
    </div>

    <div class="calendar-box">
      <div class="calendar-grid">
        <div class="weekday">日</div>
        <div class="weekday">一</div>
        <div class="weekday">二</div>
        <div class="weekday">三</div>
        <div class="weekday">四</div>
        <div class="weekday">五</div>
        <div class="weekday">六</div>
      </div>
      <div id="calendarDays" class="calendar-grid"></div>
    </div>
  </div>

  <div id="modal" class="modal-mask">
    <div class="modal">
      <div class="modal-header">
        <div id="modalTitle" class="modal-title">新增預約</div>
        <button class="btn btn-secondary" onclick="closeModal()">關閉</button>
      </div>

      <div class="modal-body">
        <div id="verifySection" style="display:none;">
          <div class="field">
            <input id="verifyPasswordOnly" type="password" maxlength="4" placeholder="請輸入原本設定的4碼密碼">
          </div>
          <div id="verifyError" class="error-box">密碼錯誤</div>
          <div class="actions">
            <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
            <button type="button" class="btn btn-primary" onclick="confirmPassword()">確認</button>
          </div>
        </div>

        <form id="bookingForm" style="display:none;">
          <div class="grid-2">
            <div class="field"><input id="name" placeholder="姓名" required></div>
            <div class="field"><input id="dept" placeholder="單位" required></div>
          </div>

          <div class="grid-2">
            <div class="field"><input id="phone" placeholder="聯絡電話" required></div>
            <div class="field"><input id="password" type="password" placeholder="密碼（編輯/修改）" maxlength="4" required></div>
          </div>

          <div class="field"><input id="date" type="date" required></div>

          <div class="grid-2">
            <div class="field"><input id="startTime" type="time" required></div>
            <div class="field"><input id="endTime" type="time" required></div>
          </div>

          <div class="field"><textarea id="note" rows="3" placeholder="備註（選填）"></textarea></div>

          <div class="field" id="verifyPasswordField" style="display:none;">
            <input id="verifyPassword" placeholder="請輸入原本設定的4碼密碼">
          </div>

          <div id="formError" class="error-box"><span id="errorMsgText"></span></div>

          <div class="actions">
            <button type="button" class="btn btn-danger" id="deleteBtn" style="display:none;" onclick="handleDelete()">刪除</button>
            <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
            <button type="submit" class="btn btn-primary" id="submitBtn">送出</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbybadQlvy-bfKGE4lvK_y4JKsfkA2qVe4ryDGAc62Nhziv5jJ1Evje4Tt4AzbylCOPo/exec";

    let viewDate = new Date();
    let bookings = [];
    let editingId = null;
    let pendingBooking = null;

    function getTodayStr() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
    }

    function formatLocalDate(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    function normalizeDateString(value) {
      if (!value) return "";
      const t = String(value).trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(t)) return t;
      if (/^\d{4}\/\d{1,2}\/\d{1,2}/.test(t)) {
        const p = t.split(" ")[0].split("/");
        return `${p[0]}-${String(p[1]).padStart(2, "0")}-${String(p[2]).padStart(2, "0")}`;
      }
      const d = new Date(t);
      if (!isNaN(d)) return formatLocalDate(d);
      return t;
    }

    function normalizeTimeString(value) {
      if (!value) return "";
      const t = String(value).trim();
      if (/^\d{2}:\d{2}$/.test(t)) return t;

      if (/上午|下午/.test(t)) {
        const isPM = t.includes("下午");
        const m = t.match(/(\d{1,2}):(\d{2})/);
        if (m) {
          let hour = parseInt(m[1], 10);
          const minute = m[2];
          if (isPM && hour < 12) hour += 12;
          if (!isPM && hour === 12) hour = 0;
          return `${String(hour).padStart(2, "0")}:${minute}`;
        }
      }

      const m2 = t.match(/(\d{1,2}):(\d{2})/);
      if (m2) return `${String(m2[1]).padStart(2, "0")}:${m2[2]}`;
      return t;
    }

    function toggleLoading(show) {
      document.getElementById("loadingOverlay").style.display = show ? "flex" : "none";
    }

    function showError(msg) {
      document.getElementById("errorMsgText").textContent = msg;
      document.getElementById("formError").style.display = "block";
    }

    async function syncData() {
      toggleLoading(true);
      try {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();

        if (!Array.isArray(data)) {
          bookings = [];
          return;
        }

        bookings = data.map(item => ({
          id: String(item.id || ""),
          name: item["姓名"] || "",
          dept: item["單位"] || "",
          phone: item["聯絡電話"] || "",
          password: item["設定密碼"] || "",
          date: normalizeDateString(item["預約日期"]),
          startTime: normalizeTimeString(item["開始時間"]),
          endTime: normalizeTimeString(item["結束時間"]),
          note: item["備註（選填）"] || ""
        }));
      } catch (e) {
        console.error("同步失敗:", e);
        bookings = [];
      } finally {
        toggleLoading(false);
      }
    }

    async function postToSheet(payload) {
      toggleLoading(true);
      try {
        const res = await fetch(SCRIPT_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });

        const text = await res.text();

        try {
          return JSON.parse(text);
        } catch (e) {
          console.error("Apps Script 回傳不是 JSON：", text);
          return {
            success: false,
            message: "後端回傳格式錯誤，請確認 Apps Script 是否重新部署"
          };
        }
      } catch (e) {
        console.error("提交失敗:", e);
        return {
          success: false,
          message: "無法連線到 Apps Script，請檢查 SCRIPT_URL 或部署權限"
        };
      } finally {
        toggleLoading(false);
      }
    }

    function renderCalendar() {
      const calendarDays = document.getElementById("calendarDays");
      calendarDays.innerHTML = "";

      const year = viewDate.getFullYear();
      const month = viewDate.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const totalDays = new Date(year, month + 1, 0).getDate();
      const todayStr = getTodayStr();

      document.getElementById("monthDisplay").textContent = `${year}年${month + 1}月`;

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement("div");
        empty.className = "day empty";
        calendarDays.appendChild(empty);
      }

      for (let d = 1; d <= totalDays; d++) {
        const dateObj = new Date(year, month, d);
        const dateStr = formatLocalDate(dateObj);

        const dayBookings = bookings
          .filter(b => b.date === dateStr)
          .sort((a, b) => a.startTime.localeCompare(b.startTime));

        const day = document.createElement("div");
        day.className = "day";

        let bookingHtml = "";
        dayBookings.forEach(b => {
          bookingHtml += `
            <div class="booking" onclick="openEditModal('${b.id}')">
              <div class="booking-time">${b.startTime}–${b.endTime}</div>
              <div>${b.name}</div>
              <div class="booking-dept">${b.dept}</div>
            </div>
          `;
        });

        day.innerHTML = `
          <div class="day-number ${dateStr === todayStr ? "today" : ""}">${d}</div>
          ${bookingHtml}
        `;

        calendarDays.appendChild(day);
      }
    }

    function changeMonth(delta) {
      viewDate.setMonth(viewDate.getMonth() + delta);
      renderCalendar();
    }

    function goToToday() {
      viewDate = new Date();
      renderCalendar();
    }

    function resetForm() {
      document.getElementById("bookingForm").reset();
      document.getElementById("formError").style.display = "none";
      document.getElementById("verifyError").style.display = "none";
      document.getElementById("verifySection").style.display = "none";
      document.getElementById("bookingForm").style.display = "none";
      document.getElementById("verifyPasswordField").style.display = "none";
      document.getElementById("deleteBtn").style.display = "none";
      document.getElementById("modalTitle").textContent = "新增預約";
      document.getElementById("submitBtn").textContent = "送出";
      document.getElementById("verifyPassword").value = "";
      document.getElementById("verifyPasswordOnly").value = "";
      editingId = null;
      pendingBooking = null;
    }

    function openAddModal() {
      resetForm();
      document.getElementById("date").value = getTodayStr();
      document.getElementById("startTime").value = "09:00";
      document.getElementById("endTime").value = "10:00";
      document.getElementById("bookingForm").style.display = "block";
      document.getElementById("modalTitle").textContent = "新增預約";
      document.getElementById("submitBtn").textContent = "送出";
      document.getElementById("modal").style.display = "flex";
    }

    function openEditModal(id) {
      const booking = bookings.find(b => b.id === String(id));
      if (!booking) return;

      resetForm();
      editingId = String(id);
      pendingBooking = booking;

      document.getElementById("modalTitle").textContent = "請先驗證密碼";
      document.getElementById("verifySection").style.display = "block";
      document.getElementById("modal").style.display = "flex";
    }

    function confirmPassword() {
      if (!pendingBooking) return;

      const inputPassword = document.getElementById("verifyPasswordOnly").value.trim();

      if (!inputPassword) {
        document.getElementById("verifyError").textContent = "請輸入原本設定的4碼密碼";
        document.getElementById("verifyError").style.display = "block";
        return;
      }

      if (inputPassword !== String(pendingBooking.password)) {
        document.getElementById("verifyError").textContent = "密碼錯誤";
        document.getElementById("verifyError").style.display = "block";
        return;
      }

      document.getElementById("verifyError").style.display = "none";
      document.getElementById("verifySection").style.display = "none";
      document.getElementById("bookingForm").style.display = "block";

      document.getElementById("modalTitle").textContent = "修改 / 刪除預約";
      document.getElementById("submitBtn").textContent = "儲存修改";
      document.getElementById("deleteBtn").style.display = "inline-block";
      document.getElementById("verifyPasswordField").style.display = "block";

      document.getElementById("name").value = pendingBooking.name;
      document.getElementById("dept").value = pendingBooking.dept;
      document.getElementById("phone").value = pendingBooking.phone;
      document.getElementById("password").value = "";
      document.getElementById("date").value = pendingBooking.date;
      document.getElementById("startTime").value = pendingBooking.startTime;
      document.getElementById("endTime").value = pendingBooking.endTime;
      document.getElementById("note").value = pendingBooking.note || "";
      document.getElementById("verifyPassword").value = inputPassword;
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }

    function checkConflict(newB, excludeId = null) {
      return bookings.some(b => {
        if (excludeId && b.id === String(excludeId)) return false;
        if (b.date !== newB.date) return false;
        return (newB.startTime < b.endTime) && (newB.endTime > b.startTime);
      });
    }

    async function handleDelete() {
      if (!editingId) return;

      const verifyPassword = document.getElementById("verifyPassword").value.trim();

      if (!verifyPassword) {
        showError("請輸入原本設定的4碼密碼");
        return;
      }

      const result = await postToSheet({
        action: "delete",
        id: editingId,
        "驗證密碼": verifyPassword
      });

      if (!result.success) {
        showError(result.message || "刪除失敗");
        return;
      }

      alert("刪除成功");
      closeModal();
      await syncData();
      renderCalendar();
    }

    async function handleFormSubmit(e) {
      e.preventDefault();
      document.getElementById("formError").style.display = "none";

      const newBooking = {
        name: document.getElementById("name").value.trim(),
        dept: document.getElementById("dept").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        password: document.getElementById("password").value.trim(),
        date: document.getElementById("date").value,
        startTime: document.getElementById("startTime").value,
        endTime: document.getElementById("endTime").value,
        note: document.getElementById("note").value.trim()
      };

      if (editingId && !newBooking.password && pendingBooking) {
        newBooking.password = String(pendingBooking.password || "");
      }

      if (!newBooking.name || !newBooking.dept || !newBooking.phone || !newBooking.password || !newBooking.date || !newBooking.startTime || !newBooking.endTime) {
        showError("請填寫所有必填欄位");
        return;
      }

      if (newBooking.password.length !== 4) {
        showError("請輸入四位數密碼");
        return;
      }

      if (newBooking.startTime >= newBooking.endTime) {
        showError("結束時間必須晚於開始時間");
        return;
      }

      if (checkConflict(newBooking, editingId)) {
        showError("此時段已有其他預約，請更換時間");
        return;
      }

      let result;

      if (editingId) {
        const verifyPassword = document.getElementById("verifyPassword").value.trim();

        if (!verifyPassword) {
          showError("請輸入原本設定的4碼密碼");
          return;
        }

        result = await postToSheet({
          action: "update",
          id: editingId,
          "姓名": newBooking.name,
          "單位": newBooking.dept,
          "聯絡電話": newBooking.phone,
          "設定密碼": newBooking.password,
          "預約日期": newBooking.date,
          "開始時間": newBooking.startTime,
          "結束時間": newBooking.endTime,
          "備註（選填）": newBooking.note,
          "驗證密碼": verifyPassword
        });
      } else {
        result = await postToSheet({
          action: "create",
          "姓名": newBooking.name,
          "單位": newBooking.dept,
          "聯絡電話": newBooking.phone,
          "設定密碼": newBooking.password,
          "預約日期": newBooking.date,
          "開始時間": newBooking.startTime,
          "結束時間": newBooking.endTime,
          "備註（選填）": newBooking.note
        });
      }

      if (!result.success) {
        showError(result.message || "操作失敗");
        return;
      }

      alert(editingId ? "修改成功" : "預約成功");
      closeModal();
      await syncData();
      renderCalendar();
    }

    window.onload = async function () {
      document.getElementById("bookingForm").addEventListener("submit", handleFormSubmit);
      await syncData();
      renderCalendar();
    };
  </script>
</body>
</html>
