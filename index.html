<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>B棟1樓大會議室預約</title>

<script src="https://unpkg.com/lucide@latest"></script>

<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:0;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.title{
font-size:28px;
font-weight:bold;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
}

.calendar{
background:white;
border-radius:10px;
padding:20px;
}

.week{
display:grid;
grid-template-columns:repeat(7,1fr);
font-weight:bold;
text-align:center;
margin-bottom:10px;
}

.days{
display:grid;
grid-template-columns:repeat(7,1fr);
}

.day{
border:1px solid #eee;
min-height:120px;
padding:6px;
}

.booking{
background:#eef2ff;
padding:4px;
margin-top:3px;
font-size:12px;
border-radius:6px;
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.4);
display:flex;
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:20px;
border-radius:10px;
width:350px;
}

input,textarea{
width:100%;
padding:6px;
margin-bottom:10px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="header">
<div class="title">B棟1樓大會議室</div>
<button onclick="openModal()">我要預約</button>
</div>

<div class="calendar">
<div id="monthTitle"></div>

<div class="week">
<div>日</div>
<div>一</div>
<div>二</div>
<div>三</div>
<div>四</div>
<div>五</div>
<div>六</div>
</div>

<div class="days" id="calendarDays"></div>
</div>

<div id="modal" class="modal hidden">
<div class="modal-box">

<h3>新增預約</h3>

<input id="name" placeholder="王小明">
<input id="dept" placeholder="資通處XX科">
<input id="phone" placeholder="0912345678">
<input id="password" placeholder="四位數密碼">
<input type="date" id="date">
<input type="time" id="startTime">
<input type="time" id="endTime">
<textarea id="note" placeholder="備註（選填）"></textarea>

<button onclick="submitBooking()">送出</button>
<button onclick="closeModal()">取消</button>

</div>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbwVHEFBQ8UVFWm8VdTgChgb1VQh78al21NQcP65BI5y4KzB903SNhLt9ojqOD20JtJZpw/exec";

let bookings=[];
let viewDate=new Date();

function formatDate(date){
return date.toISOString().split('T')[0];
}

async function loadBookings(){

const res=await fetch(API_URL);
const data=await res.json();

bookings=data.map(row=>({
name:row["姓名"],
dept:row["單位"],
phone:row["聯絡電話"],
password:row["設定密碼"],
date:row["預約日期"],
start:row["開始時間"],
end:row["結束時間"],
note:row["備註（選填）"]
}));

renderCalendar();

}

function renderCalendar(){

const year=viewDate.getFullYear();
const month=viewDate.getMonth();

document.getElementById("monthTitle").innerText=
`${year}年${month+1}月`;

const firstDay=new Date(year,month,1).getDay();
const totalDays=new Date(year,month+1,0).getDate();

const container=document.getElementById("calendarDays");
container.innerHTML="";

for(let i=0;i<firstDay;i++){
container.innerHTML+=`<div class="day"></div>`;
}

for(let d=1;d<=totalDays;d++){

const dateStr=formatDate(new Date(year,month,d));

let html=`<div class="day"><b>${d}</b>`;

bookings
.filter(b=>b.date===dateStr)
.forEach(b=>{
html+=`
<div class="booking">
${b.start}-${b.end}<br>
${b.name}<br>
${b.dept}
</div>`;
});

html+=`</div>`;

container.innerHTML+=html;

}

}

function openModal(){
document.getElementById("modal").classList.remove("hidden");
}

function closeModal(){
document.getElementById("modal").classList.add("hidden");
}

async function submitBooking(){

const data={
"姓名":document.getElementById("name").value,
"單位":document.getElementById("dept").value,
"聯絡電話":document.getElementById("phone").value,
"設定密碼":document.getElementById("password").value,
"預約日期":document.getElementById("date").value,
"開始時間":document.getElementById("startTime").value,
"結束時間":document.getElementById("endTime").value,
"備註（選填）":document.getElementById("note").value
};

const res=await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"text/plain"
},
body:JSON.stringify(data)
});

const result=await res.json();

if(result.success){
alert("預約成功");
closeModal();
loadBookings();
}else{
alert(result.message);
}

}

window.onload=loadBookings;

</script>

</body>
</html>
